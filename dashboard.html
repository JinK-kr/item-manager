<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>현황 대시보드 · 우리 반 물품 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">

    <header class="site-header">
      <div>
        <h1 class="site-title">현황 대시보드</h1>
        <p class="site-sub">지금 물품이 어떤 상태인지 한눈에 봐요</p>
      </div>
      <a class="nav-link" href="index.html">&larr; 물품 목록으로</a>
    </header>

    <div id="storage-warning"></div>

    <div class="dash-grid">

      <!-- 위젯 1. 총 품목 수 -->
      <section class="card">
        <h2 class="card-title">총 품목 수</h2>
        <div id="w-total"></div>
      </section>

      <!-- 위젯 2. 재고 부족 목록 (수량 3개 이하) -->
      <section class="card">
        <h2 class="card-title">재고 부족 <span class="count">수량 3개 이하</span></h2>
        <div id="w-low"></div>
      </section>

      <!-- 위젯 3. 카테고리별 분포 -->
      <section class="card">
        <h2 class="card-title">카테고리별 분포 <span class="count">품목 수 기준</span></h2>
        <div id="w-donut"></div>
      </section>

      <!-- 위젯 4. 최근 변경 내역 -->
      <section class="card">
        <h2 class="card-title">최근 변경 내역 <span class="count">최근 5건</span></h2>
        <div id="w-recent"></div>
      </section>

    </div>

    <!-- 개발용 도구: 차트를 미리 보려고 만든 것. 실제 운영에서는 지워도 된다. -->
    <section class="card tools">
      <h2 class="card-title">테스트 도구</h2>
      <div class="tools-row">
        <button type="button" class="btn" id="btn-seed">테스트 물품 10개 넣기</button>
        <button type="button" class="btn" id="btn-unseed">테스트 물품 지우기</button>
      </div>
      <p class="tools-msg" id="tools-msg" role="status" aria-live="polite"></p>
      <p class="tools-note">
        위젯이 어떻게 보이는지 확인하려고 만든 버튼이에요.
        <strong>넣기</strong>는 지금 있는 물품을 그대로 두고 10개를 더합니다.
        <strong>지우기</strong>는 이 버튼으로 넣은 물품만 골라서 지우고, 직접 등록한 물품은 건드리지 않아요.
      </p>
    </section>

  </div>

  <script src="app.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
